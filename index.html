<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ETF 策略面板</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08111f;
      --panel: rgba(16, 26, 45, 0.96);
      --panel-2: rgba(8, 17, 31, 0.82);
      --line: rgba(86, 212, 255, 0.14);
      --text: #edf3ff;
      --muted: #9fb0cf;
      --accent: #56d4ff;
      --accent-2: #6ee7b7;
      --warn: #fde68a;
      --danger: #fca5a5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(86, 212, 255, .16), transparent 24%),
        radial-gradient(circle at top right, rgba(110, 231, 183, .10), transparent 18%),
        linear-gradient(180deg, #07101d 0%, #08111f 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    body.loading,
    body.auth-locked {
      overflow: hidden;
    }
    .shell {
      width: min(920px, calc(100vw - 20px));
      margin: 14px auto 28px;
    }
    body.loading .shell,
    body.auth-locked .shell {
      pointer-events: none;
      user-select: none;
      filter: saturate(.9);
    }
    .hero, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
    }
    .hero {
      padding: 18px 16px;
      margin-bottom: 14px;
    }
    .hero h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
    }
    .hero p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }
    .login {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .capital,
    .password-modal-input {
      width: 100%;
      height: 44px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(8, 17, 31, 0.78);
      color: var(--text);
      padding: 0 12px;
      outline: none;
      font-size: 16px;
    }
    .capital {
      font-variant-numeric: tabular-nums;
    }
    .action-btn,
    .modal-btn {
      height: 44px;
      padding: 0 16px;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #06101d;
      font-weight: 700;
      cursor: pointer;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .toolbar button {
      min-width: 78px;
      height: 40px;
      padding: 0 14px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(8, 17, 31, 0.78);
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
    }
    .toolbar button.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #06101d;
      border-color: transparent;
      font-weight: 700;
    }
    .toolbar button.warn {
      color: var(--warn);
      border-color: rgba(253, 230, 138, 0.26);
    }
    .status {
      margin-top: 12px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
      min-height: 20px;
    }
    .status.error {
      color: var(--danger);
    }
    .sizing-card {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      background: rgba(8, 17, 31, 0.72);
      border: 1px solid rgba(86, 212, 255, 0.12);
    }
    .sizing-title {
      font-size: 13px;
      color: var(--text);
      margin-bottom: 6px;
    }
    .sizing-list {
      display: grid;
      gap: 6px;
    }
    .sizing-item,
    .sizing-empty {
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
    }
    .sizing-item strong {
      color: var(--text);
      font-weight: 700;
    }
    .panel {
      overflow: hidden;
    }
    .panel-header {
      padding: 16px;
      border-bottom: 1px solid rgba(159, 176, 207, 0.12);
    }
    .eyebrow {
      color: var(--accent);
      font-size: 12px;
      margin-bottom: 6px;
    }
    .panel-header h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }
    .badges {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    .badge {
      padding: 9px 10px;
      border-radius: 8px;
      background: rgba(8, 17, 31, 0.78);
      border: 1px solid rgba(86, 212, 255, 0.12);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      padding: 14px;
    }
    .section {
      background: var(--panel-2);
      border: 1px solid rgba(159, 176, 207, 0.14);
      border-radius: 8px;
      padding: 12px 12px 8px;
    }
    .section h3 {
      margin: 0 0 10px;
      font-size: 14px;
      color: var(--text);
    }
    .line {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.68;
      color: #dce6ff;
      padding: 2px 0;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .empty {
      color: var(--muted);
      font-size: 13px;
      padding-top: 2px;
    }
    .loading-overlay,
    .auth-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(4px);
      transition: opacity .18s ease;
    }
    .loading-overlay {
      background: rgba(3, 8, 18, 0.62);
      opacity: 0;
      pointer-events: none;
      z-index: 999;
    }
    body.loading .loading-overlay {
      opacity: 1;
      pointer-events: auto;
    }
    .auth-overlay {
      background: rgba(3, 8, 18, 0.72);
      opacity: 0;
      pointer-events: none;
      z-index: 1000;
    }
    body.auth-locked .auth-overlay {
      opacity: 1;
      pointer-events: auto;
    }
    .loading-card,
    .auth-card {
      width: min(360px, calc(100vw - 32px));
      padding: 18px 18px 16px;
      border-radius: 8px;
      border: 1px solid rgba(86, 212, 255, 0.16);
      background: rgba(16, 26, 45, 0.98);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.34);
    }
    .loading-card {
      text-align: center;
    }
    .loading-spinner {
      width: 32px;
      height: 32px;
      margin: 0 auto 12px;
      border-radius: 50%;
      border: 3px solid rgba(159, 176, 207, 0.18);
      border-top-color: var(--accent);
      animation: spin .8s linear infinite;
    }
    .loading-title,
    .auth-title {
      color: var(--text);
      font-size: 15px;
      font-weight: 700;
    }
    .loading-subtitle,
    .auth-copy {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      margin-top: 6px;
    }
    .auth-form {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }
    .auth-error {
      min-height: 18px;
      font-size: 12px;
      color: var(--danger);
      margin-top: 8px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @media (min-width: 720px) {
      .shell {
        width: min(1180px, calc(100vw - 28px));
      }
      .panel-header {
        padding: 20px;
      }
      .login {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
      }
      .badges {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        padding: 18px;
      }
      .section.wide {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body class="auth-locked">
  <main class="shell">
    <section class="hero">
      <h1>ETF 策略面板</h1>
      <p>策略结果缓存保存在当前浏览器。口令只在当前页面内存里使用，不做本地保存。金额仅用于本地估算购买份数。</p>
      <div class="login">
        <input id="capitalInput" class="capital" type="text" inputmode="decimal" placeholder="当前金额，例如 20000" />
        <button id="amountConfirmBtn" class="action-btn">确认金额</button>
      </div>
      <div class="toolbar">
        <button id="btnV7" class="active">V7</button>
        <button id="btnV8">V8</button>
        <button id="btnRefresh" class="warn">获取最新数据</button>
      </div>
      <div class="status" id="status">请先获取策略结果</div>
      <div class="sizing-card">
        <div class="sizing-title">信号购买数量</div>
        <div class="sizing-list" id="sizingList">
          <div class="sizing-empty">请先获取策略结果。</div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <div class="eyebrow" id="panelEyebrow">未加载</div>
        <h2 id="panelTitle">策略结果</h2>
        <div class="badges" id="badges"></div>
      </div>
      <div class="grid" id="grid"></div>
    </section>
  </main>

  <div class="loading-overlay" id="loadingOverlay" aria-hidden="true">
    <div class="loading-card" role="status" aria-live="polite">
      <div class="loading-spinner"></div>
      <div class="loading-title" id="loadingTitle">请求中</div>
      <div class="loading-subtitle" id="loadingSubtitle">正在获取最新策略结果</div>
    </div>
  </div>

  <div class="auth-overlay" id="authOverlay" aria-hidden="false">
    <div class="auth-card">
      <div class="auth-title">输入访问口令</div>
      <div class="auth-copy">输入口令后才能操作页面。</div>
      <div class="auth-form">
        <input id="passwordModalInput" class="password-modal-input" type="password" inputmode="numeric" placeholder="输入访问口令" />
        <button id="passwordSubmitBtn" class="modal-btn">进入页面</button>
      </div>
      <div class="auth-error" id="authError"></div>
    </div>
  </div>

  <script>
    const DEFAULT_BASE_URL = "https://1258557411-28azoctxlh.ap-guangzhou.tencentscf.com";
    const baseUrl = DEFAULT_BASE_URL.replace(/\/+$/, "");

    const capitalInput = document.getElementById("capitalInput");
    const amountConfirmBtn = document.getElementById("amountConfirmBtn");
    const statusEl = document.getElementById("status");
    const panelEyebrow = document.getElementById("panelEyebrow");
    const panelTitle = document.getElementById("panelTitle");
    const badgesEl = document.getElementById("badges");
    const gridEl = document.getElementById("grid");
    const sizingListEl = document.getElementById("sizingList");
    const btnV7 = document.getElementById("btnV7");
    const btnV8 = document.getElementById("btnV8");
    const btnRefresh = document.getElementById("btnRefresh");
    const loadingOverlay = document.getElementById("loadingOverlay");
    const loadingTitle = document.getElementById("loadingTitle");
    const loadingSubtitle = document.getElementById("loadingSubtitle");
    const authOverlay = document.getElementById("authOverlay");
    const passwordModalInput = document.getElementById("passwordModalInput");
    const passwordSubmitBtn = document.getElementById("passwordSubmitBtn");
    const authErrorEl = document.getElementById("authError");

    const AMOUNT_STORAGE_KEY = "etf_strategy_amount_v1";
    const STRATEGY_BUNDLE_STORAGE_KEY = "etf_strategy_bundle_v2";

    let currentStrategy = "v7";
    let currentPassword = "";
    let currentPayload = null;
    let strategyPayloadMap = { v7: null, v8: null };
    let currentSplitMap = {};

    const SECTION_ORDER = [
      "卖出计划",
      "当前待结算持仓",
      "买入计划",
      "页面结果",
      "最新交易日score排行",
      "新增信号详情",
      "买入条件",
      "过滤条件",
      "卖出条件",
      "最近命中明细",
      "最近卖出明细",
      "年度 / 月度收益"
    ];

    const HEADING_MAP = {
      "卖出计划:": "卖出计划",
      "当前待结算持仓:": "当前待结算持仓",
      "当前待结算持仓": "当前待结算持仓",
      "最新V7挂单计划:": "买入计划",
      "最新V8买入计划:": "买入计划",
      "最新交易日score排行:": "最新交易日score排行",
      "新增信号详情:": "新增信号详情",
      "买入条件:": "买入条件",
      "过滤条件:": "过滤条件",
      "卖出条件:": "卖出条件",
      "最近命中明细:": "最近命中明细",
      "最近交易/挂单明细:": "最近命中明细",
      "命中/挂单未成交:": "最近命中明细",
      "最近卖出明细:": "最近卖出明细",
      "卖出:": "最近卖出明细"
    };

    function isPayloadStructurallyValid(strategy, payload) {
      if (!payload || typeof payload.text !== "string") return false;
      const text = payload.text;
      if (!text.includes("最新交易日score排行")) return false;
      if (!text.includes("卖出计划")) return false;
      if (strategy === "v7" && !text.includes("最新V7挂单计划")) return false;
      if (strategy === "v8" && !text.includes("最新V8买入计划")) return false;

      const lines = splitLines(text);
      const summaryInfo = extractSummary(lines, payload);
      const sections = parseSections(lines, summaryInfo);
      const rankCount = (sections["最新交易日score排行"] || []).length;
      return rankCount >= 20;
    }

    function clearStrategyPayloads() {
      strategyPayloadMap = { v7: null, v8: null };
    }

    function currentStrategyPayload() {
      return strategyPayloadMap[currentStrategy] || null;
    }

    function normalizeStrategyResults(payload) {
      const results = payload && typeof payload.results === "object" ? payload.results : {};
      const nextMap = { v7: null, v8: null };

      for (const strategy of ["v7", "v8"]) {
        const result = results[strategy];
        if (!isPayloadStructurallyValid(strategy, result)) {
          throw new Error(`${strategy.toUpperCase()} 返回的数据不完整`);
        }
        nextMap[strategy] = { ...result };
      }

      return nextMap;
    }

    function saveStrategyBundleCache(payload) {
      const normalized = normalizeStrategyResults(payload);
      localStorage.setItem(
        STRATEGY_BUNDLE_STORAGE_KEY,
        JSON.stringify({
          cached_at: payload && payload.cached_at ? payload.cached_at : "",
          results: normalized
        })
      );
      strategyPayloadMap = {
        v7: { ...normalized.v7, front_cached: false },
        v8: { ...normalized.v8, front_cached: false }
      };
      return strategyPayloadMap;
    }

    function loadStrategyBundleCache() {
      try {
        const raw = localStorage.getItem(STRATEGY_BUNDLE_STORAGE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        const normalized = normalizeStrategyResults(parsed);
        strategyPayloadMap = {
          v7: { ...normalized.v7, front_cached: true },
          v8: { ...normalized.v8, front_cached: true }
        };
        return strategyPayloadMap;
      } catch {
        localStorage.removeItem(STRATEGY_BUNDLE_STORAGE_KEY);
        clearStrategyPayloads();
        return null;
      }
    }

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle("error", isError);
    }

    function setLoading(active, title = "请求中", subtitle = "正在获取最新策略结果") {
      document.body.classList.toggle("loading", active);
      loadingOverlay.setAttribute("aria-hidden", active ? "false" : "true");
      loadingTitle.textContent = title;
      loadingSubtitle.textContent = subtitle;
    }

    function setAuthLocked(locked, message = "") {
      document.body.classList.toggle("auth-locked", locked);
      authOverlay.setAttribute("aria-hidden", locked ? "false" : "true");
      authErrorEl.textContent = message;
      if (locked) {
        window.setTimeout(() => passwordModalInput.focus(), 30);
      }
    }

    function setActiveButton() {
      btnV7.classList.toggle("active", currentStrategy === "v7");
      btnV8.classList.toggle("active", currentStrategy === "v8");
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function splitLines(text) {
      return String(text || "").split(/\r?\n/).map(line => line.trimEnd());
    }

    function resultSource(payload) {
      if (!payload) return "-";
      if (payload.front_cached) return "前端缓存";
      if (payload.refreshed) return "最新数据";
      return "策略结果";
    }

    function isHeading(line) {
      return Object.prototype.hasOwnProperty.call(HEADING_MAP, line.trim());
    }

    function normalizeHeading(line) {
      return HEADING_MAP[line.trim()] || "";
    }

    function extractSummary(lines, payload) {
      const summary = {
        title: lines[0] || "",
        latestTrade: "",
        stats: "",
        latestAccount: "",
        yearlyTitle: "",
        yearlyLines: []
      };

      for (let i = 0; i < lines.length; i += 1) {
        const line = lines[i].trim();
        if (!summary.latestTrade && line.startsWith("最新交易日:")) {
          summary.latestTrade = line;
          continue;
        }
        if (!summary.stats && /^近\d+个交易日统计:/.test(line)) {
          summary.stats = line;
          continue;
        }
        if (
          !summary.latestAccount &&
          line.includes("卖出账户收益") &&
          line.includes("复利倍数")
        ) {
          summary.latestAccount = line;
          continue;
        }
        if (!summary.yearlyTitle && (line.includes("年度收益") || line.includes("月度卖出收益"))) {
          summary.yearlyTitle = line;
          const yearlyLines = [];
          for (let j = i + 1; j < lines.length; j += 1) {
            const next = lines[j].trim();
            if (!next) break;
            if (isHeading(next)) break;
            yearlyLines.push(next);
          }
          summary.yearlyLines = yearlyLines;
        }
      }

      const resultLines = [
        summary.latestTrade || "最新交易日: -",
        `最后缓存时间: ${payload.cached_at || "-"}`,
        `结果来源: ${resultSource(payload)}`
      ];
      if (summary.stats) resultLines.push(summary.stats);
      if (summary.latestAccount) resultLines.push(summary.latestAccount);
      if (summary.yearlyTitle) resultLines.push(summary.yearlyTitle);
      if (summary.yearlyLines.length) resultLines.push(...summary.yearlyLines);

      return { summary, resultLines };
    }

    function parseSections(lines, summaryInfo) {
      const sections = {};
      SECTION_ORDER.forEach(name => {
        sections[name] = [];
      });

      const excluded = new Set();
      if (summaryInfo.summary.latestAccount) excluded.add(summaryInfo.summary.latestAccount);
      if (summaryInfo.summary.yearlyTitle) excluded.add(summaryInfo.summary.yearlyTitle);
      summaryInfo.summary.yearlyLines.forEach(line => excluded.add(line));

      const headingIndexes = [];
      lines.forEach((line, index) => {
        const name = normalizeHeading(line);
        if (name) headingIndexes.push({ index, name });
      });

      for (let i = 0; i < headingIndexes.length; i += 1) {
        const current = headingIndexes[i];
        const nextIndex = i + 1 < headingIndexes.length ? headingIndexes[i + 1].index : lines.length;
        const body = [];
        for (let j = current.index + 1; j < nextIndex; j += 1) {
          const line = lines[j].trim();
          if (!line || excluded.has(line)) continue;
          body.push(line);
        }
        sections[current.name] = body;
      }

      sections["页面结果"] = summaryInfo.resultLines;
      return sections;
    }

    function renderSections(sections) {
      const wideSections = new Set([
        "页面结果",
        "最新交易日score排行",
        "新增信号详情",
        "最近命中明细",
        "最近卖出明细"
      ]);

      const blocks = SECTION_ORDER.map(name => {
        const lines = sections[name] || [];
        const body = lines.length
          ? lines.map(line => `<div class="line">${escapeHtml(line)}</div>`).join("")
          : `<div class="empty">暂无</div>`;
        return `
          <section class="section${wideSections.has(name) ? " wide" : ""}">
            <h3>${escapeHtml(name)}</h3>
            ${body}
          </section>
        `;
      });

      gridEl.innerHTML = blocks.join("");
    }

    function parseLooseNumber(value) {
      const cleaned = String(value || "").replace(/,/g, "").trim();
      if (!cleaned) return NaN;
      return Number(cleaned);
    }

    function roundToHundreds(value) {
      if (!Number.isFinite(value) || value <= 0) return 0;
      return Math.max(0, Math.round(value / 100) * 100);
    }

    function formatShares(value) {
      return value.toLocaleString("zh-CN");
    }

    function extractRankCloseMap(sections) {
      const map = new Map();
      const rankLines = sections["最新交易日score排行"] || [];
      for (const line of rankLines) {
        const matched = line.match(/\((S[HZ]\d+)\).*?close:([0-9.]+)/);
        if (matched) {
          map.set(matched[1], Number(matched[2]));
        }
      }
      return map;
    }

    function extractBuyPlanEntries(lines, sections) {
      const closeMap = extractRankCloseMap(sections);
      const entries = new Map();
      const buyLines = sections["买入计划"] || [];

      for (const line of buyLines) {
        const baseMatch = line.match(/^(.+?)\((S[HZ]\d+)\)/);
        if (!baseMatch) continue;
        if (line.startsWith("卖出前持仓数:")) continue;

        const name = baseMatch[1];
        const code = baseMatch[2];
        const signalCloseMatch = line.match(/信号日收盘:([0-9.]+)/);
        const buyPriceMatch = line.match(/买入价:([0-9.]+)/);
        const orderPriceMatch = line.match(/挂单价:([0-9.]+)/);
        const pendingOrderMatch = line.match(/计划下一交易日挂单\s*([0-9.]+)/);

        const signalClose = signalCloseMatch
          ? Number(signalCloseMatch[1])
          : closeMap.get(code)
            ?? (buyPriceMatch ? Number(buyPriceMatch[1]) : (orderPriceMatch ? Number(orderPriceMatch[1]) : (pendingOrderMatch ? Number(pendingOrderMatch[1]) : NaN)));

        if (!Number.isFinite(signalClose) || signalClose <= 0) continue;

        entries.set(code, {
          name,
          code,
          signalClose,
          orderPrice: orderPriceMatch ? Number(orderPriceMatch[1]) : (pendingOrderMatch ? Number(pendingOrderMatch[1]) : null),
        });
      }

      return Array.from(entries.values());
    }

    function formatSplitInfo(item) {
      if (!item || !item.has_recent_split) {
        return "近期无拆分";
      }
      const ratio = Number.isFinite(Number(item.split_ratio)) ? Number(item.split_ratio) : null;
      const ratioText = ratio === null ? "-" : ratio.toString();
      return `近期拆分: ${item.split_date || "-"} ${item.split_type || ""} ${ratioText}`.trim();
    }

    async function loadFundSplitMap(entries) {
      const codes = Array.from(new Set((entries || []).map(item => item.code).filter(Boolean)));
      if (!codes.length || !currentPassword.trim()) {
        currentSplitMap = {};
        return currentSplitMap;
      }
      try {
        const payload = await fetchJson(buildApiUrl("/api/fund/splits", { codes: codes.join(",") }));
        currentSplitMap = payload.items || {};
      } catch {
        currentSplitMap = {};
      }
      return currentSplitMap;
    }

    function renderSizingFromPayload(payload, splitMap = currentSplitMap) {
      if (!payload || !payload.text) {
        sizingListEl.innerHTML = '<div class="sizing-empty">请先获取策略结果。</div>';
        return;
      }

      const amount = parseLooseNumber(capitalInput.value);
      if (!Number.isFinite(amount) || amount <= 0) {
        sizingListEl.innerHTML = '<div class="sizing-empty">请输入当前金额后再确认。</div>';
        return;
      }

      const lines = splitLines(payload.text);
      const summaryInfo = extractSummary(lines, payload);
      const sections = parseSections(lines, summaryInfo);
      const entries = extractBuyPlanEntries(lines, sections);
      const latestAccountLine = summaryInfo.summary.latestAccount;

      if (!entries.length) {
        sizingListEl.innerHTML = `
          ${latestAccountLine ? `<div class="sizing-item"><strong>${escapeHtml(latestAccountLine)}</strong></div>` : ""}
          <div class="sizing-empty">当前买入计划里没有可估算的信号。</div>
        `;
        return;
      }

      const extraBlock = latestAccountLine
        ? `<div class="sizing-item"><strong>${escapeHtml(latestAccountLine)}</strong></div>`
        : "";
      const blocks = entries.map(item => {
        const shares = roundToHundreds(amount / item.signalClose);
        const splitInfo = formatSplitInfo(splitMap && splitMap[item.code]);
        return `
          <div class="sizing-item">
            <strong>${escapeHtml(item.name)}</strong>: ${escapeHtml(formatShares(shares))} 份
            <span> | 收盘价 ${escapeHtml(item.signalClose.toFixed(3))}${item.orderPrice && Number.isFinite(item.orderPrice) ? ` | 挂单价 ${escapeHtml(item.orderPrice.toFixed(3))}` : ""} | ${escapeHtml(splitInfo)}</span>
          </div>
        `;
      });

      sizingListEl.innerHTML = `${extraBlock}${blocks.join("")}`;
    }

    async function enrichPlanSectionsWithSplits(sections) {
      const sectionNames = ["买入计划", "卖出计划"];
      const splitEntries = [];
      const updatedSections = {};

      for (const sectionName of sectionNames) {
        const sourceLines = sections[sectionName] || [];
        updatedSections[sectionName] = sourceLines.map(line => {
          const baseMatch = line.match(/^(.+?)\((S[HZ]\d+)\)/);
          if (!baseMatch) return line;
          if (line.includes("近期拆分:") || line.includes("近期无拆分")) return line;
          splitEntries.push({ code: baseMatch[2] });
          return line;
        });
      }

      const splitMap = await loadFundSplitMap(splitEntries);

      for (const sectionName of sectionNames) {
        sections[sectionName] = (updatedSections[sectionName] || []).map(line => {
          const baseMatch = line.match(/^(.+?)\((S[HZ]\d+)\)/);
          if (!baseMatch) return line;
          const code = baseMatch[2];
          return `${line} | ${formatSplitInfo(splitMap[code])}`;
        });
      }
      return splitMap;
    }

    async function renderPayload(payload) {
      currentPayload = payload;
      const lines = splitLines(payload.text);
      const summaryInfo = extractSummary(lines, payload);
      const sections = parseSections(lines, summaryInfo);
      const splitMap = await enrichPlanSectionsWithSplits(sections);

      panelEyebrow.textContent = summaryInfo.summary.title || (currentStrategy === "v7" ? "V7 Pro" : "V8 Pro");
      panelTitle.textContent = currentStrategy === "v7" ? "V7 策略结果" : "V8 策略结果";

      const badges = [
        summaryInfo.summary.latestTrade || "最新交易日: -",
        `最后缓存时间: ${payload.cached_at || "-"}`,
        `结果来源: ${resultSource(payload)}`
      ];
      if (summaryInfo.summary.stats) badges.push(summaryInfo.summary.stats);
      badgesEl.innerHTML = badges.map(item => `<div class="badge">${escapeHtml(item)}</div>`).join("");

      renderSections(sections);
      renderSizingFromPayload(payload, splitMap);
    }

    async function fetchJson(url) {
      const response = await fetch(url, { cache: "no-store" });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok || payload.ok === false) {
        throw new Error(payload.message || payload.error || `HTTP ${response.status}`);
      }
      return payload;
    }

    function buildApiUrl(path, params = {}) {
      if (!currentPassword.trim()) {
        throw new Error("请先输入口令");
      }
      const searchParams = new URLSearchParams();
      Object.entries(params).forEach(([key, value]) => {
        if (value !== undefined && value !== null && value !== "") {
          searchParams.set(key, String(value));
        }
      });
      searchParams.set("password", currentPassword.trim());
      return `${baseUrl}${path}?${searchParams.toString()}`;
    }

    async function fetchStrategyBundle(forceRefresh = false) {
      const params = { mode: "json" };
      if (forceRefresh) {
        params.refresh = "1";
      }
      const payload = await fetchJson(buildApiUrl("/api/strategies", params));
      return saveStrategyBundleCache(payload);
    }

    function isPasswordError(message) {
      const text = String(message || "");
      return text.includes("Unauthorized") || text.includes("password error");
    }

    function isFrontendCacheMissError(message) {
      const text = String(message || "");
      return text.includes("暂无前端缓存")
        || text.includes("暂无 V7 缓存结果")
        || text.includes("暂无 V8 缓存结果");
    }

    function handleStrategyError(error, statusPrefix = "请求失败", preserveCurrent = false) {
      const message = error && error.message ? error.message : "请求失败";
      if (isPasswordError(message)) {
        currentPassword = "";
        passwordModalInput.value = "";
        clearStrategyPayloads();
        currentSplitMap = {};
        currentPayload = null;
        setAuthLocked(true, "口令错误，请重新输入。");
      } else if (isFrontendCacheMissError(message)) {
        badgesEl.innerHTML = "";
        gridEl.innerHTML = `<section class="section wide"><h3>提示</h3><div class="line">${escapeHtml(message)}</div></section>`;
        renderSizingFromPayload(null);
      } else {
        window.alert(`${statusPrefix}: ${message}`);
      }
      setStatus(`${statusPrefix}: ${message}`, true);
      if (!preserveCurrent || !currentPayload) {
        currentPayload = null;
        badgesEl.innerHTML = "";
        gridEl.innerHTML = `<section class="section wide"><h3>错误</h3><div class="line">${escapeHtml(message)}</div></section>`;
        renderSizingFromPayload(null);
      }
    }

    async function renderCurrentStrategyFromBundle() {
      const payload = currentStrategyPayload();
      if (!payload) {
        throw new Error(`暂无 ${currentStrategy.toUpperCase()} 缓存结果，请先获取最新数据`);
      }
      setStatus(`完成 | ${currentStrategy.toUpperCase()} | ${resultSource(payload)} | ${payload.cached_at || "-"}`);
      await renderPayload(payload);
    }

    async function switchStrategy(strategy) {
      currentStrategy = strategy;
      setActiveButton();

      try {
        if (!currentPassword.trim()) {
          throw new Error("请先输入口令");
        }
        if (!strategyPayloadMap.v7 || !strategyPayloadMap.v8) {
          const cached = loadStrategyBundleCache();
          if (!cached) {
            throw new Error("暂无前端缓存结果，请点击获取最新数据");
          }
        }
        await renderCurrentStrategyFromBundle();
      } catch (error) {
        handleStrategyError(error, "读取失败", true);
      }
    }

    async function refreshStrategies() {
      try {
        if (!currentPassword.trim()) {
          throw new Error("请先输入口令");
        }
        setStatus("获取中: V7 / V8");
        setLoading(true, "获取最新数据", "正在获取 V7 / V8 最新结果");
        await fetchStrategyBundle(true);
        await renderCurrentStrategyFromBundle();
      } catch (error) {
        handleStrategyError(error, "获取失败", true);
      } finally {
        setLoading(false);
      }
    }

    function confirmAmount() {
      localStorage.setItem(AMOUNT_STORAGE_KEY, capitalInput.value.trim());
      if (!currentPayload) {
        setStatus("请先获取策略结果");
        sizingListEl.innerHTML = '<div class="sizing-empty">请先获取策略结果。</div>';
        return;
      }
      setStatus("金额已确认，可查看当前买入计划份数");
      renderSizingFromPayload(currentPayload);
    }

    async function unlockPage() {
      const password = passwordModalInput.value.trim();
      if (!password) {
        setAuthLocked(true, "请输入访问口令。");
        return;
      }
      currentPassword = password;
      clearStrategyPayloads();
      currentSplitMap = {};
      setAuthLocked(false);
      try {
        const cached = loadStrategyBundleCache();
        if (cached && currentStrategyPayload()) {
          await renderCurrentStrategyFromBundle();
        } else {
          setStatus("暂无前端缓存，请点击获取最新数据");
          badgesEl.innerHTML = "";
          gridEl.innerHTML = '<section class="section wide"><h3>提示</h3><div class="line">暂无前端缓存，请点击获取最新数据</div></section>';
          renderSizingFromPayload(null);
        }
      } catch (error) {
        handleStrategyError(error, "读取失败");
      }
    }

    capitalInput.value = localStorage.getItem(AMOUNT_STORAGE_KEY) || "";

    passwordSubmitBtn.addEventListener("click", () => { void unlockPage(); });
    passwordModalInput.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        void unlockPage();
      }
    });
    amountConfirmBtn.addEventListener("click", confirmAmount);
    capitalInput.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        confirmAmount();
      }
    });
    btnV7.addEventListener("click", () => { void switchStrategy("v7"); });
    btnV8.addEventListener("click", () => { void switchStrategy("v8"); });
    btnRefresh.addEventListener("click", () => { void refreshStrategies(); });

    setActiveButton();
    renderSizingFromPayload(null);
    setStatus("请输入口令后读取前端缓存");
    setAuthLocked(true);
  </script>
</body>
</html>
