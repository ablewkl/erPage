<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ETF 策略面板</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08111f;
      --panel: rgba(16, 26, 45, 0.96);
      --panel-2: rgba(8, 17, 31, 0.82);
      --line: rgba(86, 212, 255, 0.14);
      --text: #edf3ff;
      --muted: #9fb0cf;
      --accent: #56d4ff;
      --accent-2: #6ee7b7;
      --warn: #fde68a;
      --danger: #fca5a5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(86, 212, 255, .16), transparent 24%),
        radial-gradient(circle at top right, rgba(110, 231, 183, .10), transparent 18%),
        linear-gradient(180deg, #07101d 0%, #08111f 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    body.loading {
      overflow: hidden;
    }
    .shell {
      width: min(920px, calc(100vw - 20px));
      margin: 14px auto 28px;
    }
    body.loading .shell {
      pointer-events: none;
      user-select: none;
      filter: saturate(.9);
    }
    .hero, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
    }
    .hero {
      padding: 18px 16px;
      margin-bottom: 14px;
    }
    .hero h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
    }
    .hero p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }
    .login {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }
    .password {
      width: 100%;
      height: 44px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(8, 17, 31, 0.78);
      color: var(--text);
      padding: 0 12px;
      outline: none;
      font-size: 16px;
    }
    .unlock {
      height: 44px;
      padding: 0 16px;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #06101d;
      font-weight: 700;
      cursor: pointer;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .toolbar button {
      min-width: 78px;
      height: 40px;
      padding: 0 14px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(8, 17, 31, 0.78);
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
    }
    .toolbar button.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #06101d;
      border-color: transparent;
      font-weight: 700;
    }
    .toolbar button.warn {
      color: var(--warn);
      border-color: rgba(253, 230, 138, 0.26);
    }
    .status {
      margin-top: 12px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
      min-height: 20px;
    }
    .status strong { color: var(--text); }
    .status.error { color: var(--danger); }
    .panel {
      overflow: hidden;
    }
    .panel-header {
      padding: 16px;
      border-bottom: 1px solid rgba(159, 176, 207, 0.12);
    }
    .eyebrow {
      color: var(--accent);
      font-size: 12px;
      margin-bottom: 6px;
    }
    .panel-header h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }
    .badges {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    .badge {
      padding: 9px 10px;
      border-radius: 8px;
      background: rgba(8, 17, 31, 0.78);
      border: 1px solid rgba(86, 212, 255, 0.12);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      padding: 14px;
    }
    .section {
      background: var(--panel-2);
      border: 1px solid rgba(159, 176, 207, 0.14);
      border-radius: 8px;
      padding: 12px 12px 8px;
    }
    .section h3 {
      margin: 0 0 10px;
      font-size: 14px;
      color: var(--text);
    }
    .line {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.68;
      color: #dce6ff;
      padding: 2px 0;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .empty {
      color: var(--muted);
      font-size: 13px;
      padding-top: 2px;
    }
    .loading-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(3, 8, 18, 0.62);
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease;
      z-index: 999;
    }
    body.loading .loading-overlay {
      opacity: 1;
      pointer-events: auto;
    }
    .loading-card {
      min-width: 180px;
      max-width: 240px;
      padding: 18px 18px 16px;
      border-radius: 8px;
      border: 1px solid rgba(86, 212, 255, 0.16);
      background: rgba(16, 26, 45, 0.98);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.34);
      text-align: center;
    }
    .loading-spinner {
      width: 32px;
      height: 32px;
      margin: 0 auto 12px;
      border-radius: 50%;
      border: 3px solid rgba(86, 212, 255, 0.18);
      border-top-color: var(--accent);
      animation: spin .8s linear infinite;
    }
    .loading-title {
      font-size: 15px;
      color: var(--text);
      line-height: 1.3;
    }
    .loading-subtitle {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @media (min-width: 900px) {
      .shell {
        width: min(1320px, calc(100vw - 28px));
        margin: 18px auto 36px;
      }
      .hero {
        padding: 20px;
      }
      .login {
        grid-template-columns: 280px auto;
        justify-content: start;
      }
      .panel-header {
        padding: 20px;
      }
      .badges {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        padding: 18px;
      }
      .section.wide {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1>ETF 策略面板</h1>
      <p>策略结果缓存在当前浏览器。口令只在当前页面内存里使用，不做本地保存。</p>
      <div class="login">
        <input id="passwordInput" class="password" type="password" inputmode="numeric" placeholder="输入访问口令" />
        <button id="unlockBtn" class="unlock">进入</button>
      </div>
      <div class="toolbar">
        <button id="btnV7" class="active">V7</button>
        <button id="btnV8">V8</button>
        <button id="btnRefresh" class="warn">刷新缓存</button>
      </div>
      <div class="status" id="status">等待输入口令</div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <div class="eyebrow" id="panelEyebrow">未加载</div>
        <h2 id="panelTitle">策略结果</h2>
        <div class="badges" id="badges"></div>
      </div>
      <div class="grid" id="grid"></div>
    </section>
  </main>
  <div class="loading-overlay" id="loadingOverlay" aria-hidden="true">
    <div class="loading-card" role="status" aria-live="polite">
      <div class="loading-spinner"></div>
      <div class="loading-title" id="loadingTitle">请求中</div>
      <div class="loading-subtitle" id="loadingSubtitle">正在获取最新策略结果</div>
    </div>
  </div>

  <script>
    const DEFAULT_BASE_URL = "https://1258557411-28azoctxlh.ap-guangzhou.tencentscf.com";
    const baseUrl = DEFAULT_BASE_URL.replace(/\/+$/, "");
    const passwordInput = document.getElementById("passwordInput");
    const unlockBtn = document.getElementById("unlockBtn");
    const statusEl = document.getElementById("status");
    const panelEyebrow = document.getElementById("panelEyebrow");
    const panelTitle = document.getElementById("panelTitle");
    const badgesEl = document.getElementById("badges");
    const gridEl = document.getElementById("grid");
    const btnV7 = document.getElementById("btnV7");
    const btnV8 = document.getElementById("btnV8");
    const btnRefresh = document.getElementById("btnRefresh");
    const loadingOverlay = document.getElementById("loadingOverlay");
    const loadingTitle = document.getElementById("loadingTitle");
    const loadingSubtitle = document.getElementById("loadingSubtitle");

    const CACHE_PREFIX = "etf_strategy_cache_v1";
    const WINDOW_START_MINUTE = 9 * 60 + 10;
    const WINDOW_END_MINUTE = 16 * 60;

    let currentStrategy = "v7";
    let currentPassword = "";

    const SECTION_ORDER = [
      "卖出计划",
      "当前待结算持仓",
      "买入计划",
      "页面结果",
      "最新交易日score排行",
      "新增信号详细",
      "买入条件",
      "过滤条件",
      "卖出条件",
      "最近命中明细",
      "最近卖出明细",
      "年度 / 月度收益"
    ];

    const HEADING_MAP = {
      "卖出计划:": "卖出计划",
      "当前待结算持仓": "当前待结算持仓",
      "当前待结算持仓:": "当前待结算持仓",
      "最新V7挂单计划:": "买入计划",
      "最新V8买入计划:": "买入计划",
      "最新交易日score排行:": "最新交易日score排行",
      "新增信号详细:": "新增信号详细",
      "买入条件:": "买入条件",
      "过滤条件:": "过滤条件",
      "卖出条件:": "卖出条件",
      "最近命中明细:": "最近命中明细",
      "最近命中/挂单明细:": "最近命中明细",
      "命中/挂单未成": "最近命中明细",
      "最近卖出明细:": "最近卖出明细",
      "卖出:": "最近卖出明细"
    };

    function todayKey() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function currentMinuteOfDay() {
      const now = new Date();
      return now.getHours() * 60 + now.getMinutes();
    }

    function isRefreshWindow() {
      const minute = currentMinuteOfDay();
      return minute >= WINDOW_START_MINUTE && minute <= WINDOW_END_MINUTE;
    }

    function cacheStorageKey(strategy) {
      return `${CACHE_PREFIX}:${strategy}:${todayKey()}`;
    }

    function loadFrontCache(strategy) {
      try {
        const raw = localStorage.getItem(cacheStorageKey(strategy));
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || parsed.date !== todayKey()) return null;
        return parsed.payload || null;
      } catch {
        return null;
      }
    }

    function saveFrontCache(strategy, payload) {
      const wrapped = {
        strategy,
        date: todayKey(),
        cached_at: new Date().toISOString(),
        payload: {
          ...payload,
          front_cached: true
        }
      };
      localStorage.setItem(cacheStorageKey(strategy), JSON.stringify(wrapped));
    }

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle("error", isError);
    }

    function setLoading(active, title = "请求中", subtitle = "正在获取最新策略结果") {
      document.body.classList.toggle("loading", active);
      loadingOverlay.setAttribute("aria-hidden", active ? "false" : "true");
      loadingTitle.textContent = title;
      loadingSubtitle.textContent = subtitle;
    }

    function setActiveButton() {
      btnV7.classList.toggle("active", currentStrategy === "v7");
      btnV8.classList.toggle("active", currentStrategy === "v8");
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function splitLines(text) {
      return String(text || "").split(/\r?\n/).map(line => line.trimEnd());
    }

    function resultSource(payload) {
      if (payload.front_cached) return "前端缓存";
      return "实时请求";
    }

    function extractSummary(lines, payload) {
      const summary = {
        title: lines[0] || "",
        latestTrade: "",
        stats: "",
        latestAccount: "",
        yearlyTitle: "",
        yearlyLines: []
      };

      for (let i = 0; i < lines.length; i += 1) {
        const line = lines[i].trim();
        if (!summary.latestTrade && line.startsWith("最新交易日:")) {
          summary.latestTrade = line;
          continue;
        }
        if (!summary.stats && line.startsWith("近") && line.includes("个交易日统计")) {
          summary.stats = line;
          continue;
        }
        if (!summary.latestAccount && line.startsWith("最新一卖出账户收益")) {
          summary.latestAccount = line;
          continue;
        }
        if (!summary.yearlyTitle && (line.includes("年度收益") || line.includes("年月度卖出收益") || line.includes("月度卖出收益"))) {
          summary.yearlyTitle = line;
          const yearlyLines = [];
          for (let j = i + 1; j < lines.length; j += 1) {
            const next = lines[j].trim();
            if (!next) break;
            if (HEADING_MAP[next]) break;
            yearlyLines.push(next);
          }
          summary.yearlyLines = yearlyLines;
        }
      }

      const resultLines = [
        summary.latestTrade || "最新交易日: -",
        `最后缓存时间: ${payload.cached_at || "-"}`,
        `结果来源: ${resultSource(payload)}`
      ];
      if (summary.stats) resultLines.push(summary.stats);
      if (summary.latestAccount) resultLines.push(summary.latestAccount);
      if (summary.yearlyTitle) resultLines.push(summary.yearlyTitle);
      if (summary.yearlyLines.length) resultLines.push(...summary.yearlyLines);

      return { summary, resultLines };
    }

    function parseSections(lines, summaryInfo) {
      const sections = {};
      SECTION_ORDER.forEach(name => { sections[name] = []; });

      const excluded = new Set();
      if (summaryInfo.summary.latestAccount) excluded.add(summaryInfo.summary.latestAccount);
      if (summaryInfo.summary.yearlyTitle) excluded.add(summaryInfo.summary.yearlyTitle);
      summaryInfo.summary.yearlyLines.forEach(line => excluded.add(line));

      const headingIndexes = [];
      lines.forEach((line, index) => {
        const name = HEADING_MAP[line.trim()];
        if (name) headingIndexes.push({ index, name });
      });

      for (let i = 0; i < headingIndexes.length; i += 1) {
        const current = headingIndexes[i];
        const nextIndex = i + 1 < headingIndexes.length ? headingIndexes[i + 1].index : lines.length;
        const body = [];
        for (let j = current.index + 1; j < nextIndex; j += 1) {
          const line = lines[j].trim();
          if (!line || excluded.has(line)) continue;
          body.push(line);
        }
        sections[current.name] = body;
      }

      sections["页面结果"] = summaryInfo.resultLines;
      return sections;
    }

    function renderSections(sections) {
      const blocks = [];
      SECTION_ORDER.forEach(name => {
        const lines = sections[name] || [];
        const wide = ["页面结果", "最新交易日score排行", "新增信号详细", "最近命中明细", "最近卖出明细"].includes(name);
        const body = lines.length
          ? lines.map(line => `<div class="line">${escapeHtml(line)}</div>`).join("")
          : `<div class="empty">暂无</div>`;
        blocks.push(`
          <section class="section${wide ? " wide" : ""}">
            <h3>${escapeHtml(name)}</h3>
            ${body}
          </section>
        `);
      });
      gridEl.innerHTML = blocks.join("");
    }

    function renderPayload(payload) {
      const lines = splitLines(payload.text);
      const summaryInfo = extractSummary(lines, payload);
      const sections = parseSections(lines, summaryInfo);
      panelEyebrow.textContent = summaryInfo.summary.title || (currentStrategy === "v7" ? "V7 Pro" : "V8 Pro");
      panelTitle.textContent = currentStrategy === "v7" ? "V7 策略结果" : "V8 策略结果";
      const badges = [
        summaryInfo.summary.latestTrade || "最新交易日: -",
        `最后缓存时间: ${payload.cached_at || "-"}`,
        `结果来源: ${resultSource(payload)}`
      ];
      if (summaryInfo.summary.stats) badges.push(summaryInfo.summary.stats);
      badgesEl.innerHTML = badges.map(item => `<div class="badge">${escapeHtml(item)}</div>`).join("");
      renderSections(sections);
    }

    async function fetchJson(url) {
      const response = await fetch(url);
      const payload = await response.json().catch(() => ({}));
      if (!response.ok || payload.ok === false) {
        throw new Error(payload.message || payload.error || `HTTP ${response.status}`);
      }
      return payload;
    }

    function buildUrl(path) {
      const password = currentPassword.trim();
      if (!password) {
        throw new Error("请先输入口令");
      }
      return `${baseUrl}${path}?mode=json&password=${encodeURIComponent(password)}`;
    }

    function shouldUseFrontCache(strategy) {
      if (isRefreshWindow()) {
        return false;
      }
      return Boolean(loadFrontCache(strategy));
    }

    async function loadStrategy(strategy, forceNetwork = false) {
      currentStrategy = strategy;
      setActiveButton();
      try {
        if (!currentPassword.trim()) {
          throw new Error("请先输入口令");
        }

        if (!forceNetwork && shouldUseFrontCache(strategy)) {
          const cached = loadFrontCache(strategy);
          if (cached) {
            setStatus(`完成 | ${strategy.toUpperCase()} | 前端缓存 | ${cached.cached_at || "-"}`);
            renderPayload(cached);
            return;
          }
        }

        const url = buildUrl(`/api/${strategy}`);
        setStatus(`请求中: ${strategy.toUpperCase()}`);
        setLoading(true, "请求中", `正在获取 ${strategy.toUpperCase()} 最新结果`);
        const payload = await fetchJson(url);
        saveFrontCache(strategy, payload);
        const cachedPayload = loadFrontCache(strategy) || payload;
        setStatus(`完成 | ${payload.strategy.toUpperCase()} | 实时请求 | ${payload.cached_at || "-"}`);
        renderPayload(cachedPayload);
      } catch (error) {
        setStatus(`请求失败: ${error.message}`, true);
        badgesEl.innerHTML = "";
        gridEl.innerHTML = `<section class="section wide"><h3>错误</h3><div class="line">${escapeHtml(error.message)}</div></section>`;
      } finally {
        setLoading(false);
      }
    }

    async function refreshBoth() {
      try {
        if (!currentPassword.trim()) {
          throw new Error("请先输入口令");
        }
        setStatus("刷新中: 双策略缓存");
        setLoading(true, "刷新缓存", "正在重新请求并覆盖前端缓存");
        await loadStrategy(currentStrategy, true);
      } catch (error) {
        setStatus(`刷新失败: ${error.message}`, true);
      } finally {
        setLoading(false);
      }
    }

    function unlockAndLoad() {
      currentPassword = passwordInput.value;
      loadStrategy(currentStrategy);
    }

    unlockBtn.addEventListener("click", unlockAndLoad);
    passwordInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        unlockAndLoad();
      }
    });
    btnV7.addEventListener("click", () => loadStrategy("v7"));
    btnV8.addEventListener("click", () => loadStrategy("v8"));
    btnRefresh.addEventListener("click", refreshBoth);
    setActiveButton();
  </script>
</body>
</html>
